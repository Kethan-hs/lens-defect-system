services:
  - type: web
    name: lens-defect-backend
    runtime: docker
    dockerfilePath: ./docker/Dockerfile.backend
    dockerContext: .
    plan: starter
    disk:
      name: lens-db
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/data/lens_inspections.db
      - key: MODEL_PATH
        value: models/best.pt
      - key: CONFIDENCE_THRESHOLD
        value: "0.3"
