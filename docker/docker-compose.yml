services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend/models:/app/models
      - backend-db:/app/data
    environment:
      - PORT=8000
      - CONFIDENCE_THRESHOLD=0.3
      - LENS_SEG_MODEL_PATH=models/lens_seg.pt
      - MODEL_PATH=models/best.pt
      - SEG_MODEL_PATH=models/yolov8n-seg.pt
      - SEG_CONFIDENCE=0.25
      - SEG_INTERVAL=3.0
      - DB_WRITE_INTERVAL=5.0
      - DATABASE_URL=sqlite:////app/data/lens_inspections.db
    networks:
      - lens-network
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - lens-network
    restart: unless-stopped

volumes:
  backend-db:

networks:
  lens-network:
    driver: bridge
